<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin Panel</title>
  <style>
    body { font-family: Arial, sans-serif; background:#0b0f17; color:#e8eefc; margin:0; }
    header { padding:16px 20px; border-bottom:1px solid #1e2a44; display:flex; gap:12px; align-items:center; }
    a { color:#7cc4ff; text-decoration:none; }
    .wrap { max-width:1100px; margin:0 auto; padding:20px; }
    .grid { display:grid; grid-template-columns: 1fr 1fr; gap:14px; }
    .card { background:#111a2e; border:1px solid #1e2a44; border-radius:12px; padding:14px; }
    .btn { background:#2b78ff; border:none; color:white; padding:10px 12px; border-radius:10px; cursor:pointer; }
    .btn.secondary { background:#24314d; }
    .btn.danger { background:#ff3b3b; }
    input, textarea, select { width:100%; padding:10px; border-radius:10px; border:1px solid #263656; background:#0b1324; color:#e8eefc; }
    label { display:block; margin:10px 0 6px; opacity:.9; }
    .row { display:flex; gap:10px; }
    .row > * { flex:1; }
    table { width:100%; border-collapse: collapse; }
    th, td { border-bottom:1px solid #1e2a44; padding:10px; text-align:left; vertical-align:top; }
    code { background:#0b1324; padding:2px 6px; border-radius:8px; }
    .muted { opacity:.8; font-size: 13px; }
  </style>
</head>
<body>
  <script src="./app.js"></script>

  <!-- Simple admin lock (front-end only) -->
  <script>
    (function () {
      const PASS = "Alif@@8945"; // আপনার admin password
      const KEY = "panel_site_admin_ok";
      const EXP_HOURS = 12; // 12 hours session

      function isValidSession() {
        try {
          const raw = localStorage.getItem(KEY);
          if (!raw) return false;
          const data = JSON.parse(raw);
          return data.ok === true && Date.now() < data.exp;
        } catch {
          return false;
        }
      }

      if (!isValidSession()) {
        const input = prompt("Admin password দিন:");
        if (input !== PASS) {
          alert("Wrong password");
          document.documentElement.innerHTML = "";
          return;
        }
        localStorage.setItem(
          KEY,
          JSON.stringify({ ok: true, exp: Date.now() + EXP_HOURS * 60 * 60 * 1000 })
        );
      }
    })();
  </script>

  <header>
    <b>Admin Panel</b>
    <span class="muted">Products • Orders • Messages • Settings</span>
    <div style="margin-left:auto; display:flex; gap:10px;">
      <a href="./index.html" target="_blank">Open Site →</a>
      <button class="btn danger" id="btnReset">Reset Data</button>
    </div>
  </header>

  <div class="wrap">
    <div class="grid">
      <div class="card">
        <h2>Settings</h2>
        <label>Wallet Address (BEP20)</label>
        <input id="wallet" />

        <label>Network Text</label>
        <input id="network" />

        <label>Note (shown to user)</label>
        <textarea id="note" rows="2"></textarea>

        <button class="btn" id="btnSaveSettings">Save Settings</button>
      </div>

      <div class="card">
        <h2>Add Product</h2>

        <label>Name</label>
        <input id="p_name" placeholder="Panel name" />

        <div class="row">
          <div>
            <label>Price</label>
            <input id="p_price" type="number" step="0.01" value="10" />
          </div>
          <div>
            <label>Currency</label>
            <select id="p_currency">
              <option>USDT</option>
              <option>USD</option>
              <option>BDT</option>
            </select>
          </div>
        </div>

        <label>Description</label>
        <textarea id="p_desc" rows="2"></textarea>

        <label>Active</label>
        <select id="p_active">
          <option value="true">true</option>
          <option value="false">false</option>
        </select>

        <button class="btn" id="btnAddProduct">Add Product</button>
      </div>
    </div>

    <div class="card" style="margin-top:14px;">
      <h2>Products</h2>
      <div class="muted">Edit / Active toggle / Delete</div>
      <table id="productsTable"></table>
    </div>

    <div class="card" style="margin-top:14px;">
      <h2>Orders</h2>
      <div class="muted">Approve/Reject + open messages</div>
      <table id="ordersTable"></table>
    </div>

    <div class="card" style="margin-top:14px;">
      <h2>Order Messages</h2>
      <div class="row">
        <div>
          <label>Order ID</label>
          <input id="m_orderId" placeholder="order_xxx..." />
        </div>
        <div>
          <label>Reply text</label>
          <input id="m_text" placeholder="Write reply..." />
        </div>
      </div>
      <button class="btn" id="btnReply">Send Reply</button>
      <div id="msgList" style="margin-top:12px;"></div>
    </div>
  </div>

  <script>
    const S = window.PanelShop;

    function escapeHtml(s) {
      return String(s || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function loadSettingsUI() {
      const store = S.loadStore();
      document.getElementById("wallet").value = store.settings.walletAddress || "";
      document.getElementById("network").value = store.settings.network || "";
      document.getElementById("note").value = store.settings.note || "";
    }

    function renderProducts() {
      const store = S.loadStore();
      const t = document.getElementById("productsTable");

      t.innerHTML = `
        <tr>
          <th>Name</th><th>Price</th><th>Active</th><th>Actions</th>
        </tr>
        ${store.products.map(p => `
          <tr>
            <td>
              <input data-edit-name="${p.id}" value="${escapeHtml(p.name)}" />
              <div class="muted">${escapeHtml(p.description || "")}</div>
            </td>
            <td>
              <input data-edit-price="${p.id}" type="number" step="0.01" value="${Number(p.price)}" />
              <select data-edit-currency="${p.id}">
                ${["USDT","USD","BDT"].map(c => `<option ${p.currency===c?"selected":""}>${c}</option>`).join("")}
              </select>
            </td>
            <td>
              <select data-edit-active="${p.id}">
                <option value="true" ${p.active?"selected":""}>true</option>
                <option value="false" ${!p.active?"selected":""}>false</option>
              </select>
            </td>
            <td>
              <button class="btn secondary" data-save="${p.id}">Save</button>
              <button class="btn danger" data-del="${p.id}">Delete</button>
            </td>
          </tr>
        `).join("")}
      `;

      t.querySelectorAll("[data-save]").forEach(btn => {
        btn.addEventListener("click", () => {
          const id = btn.getAttribute("data-save");
          const name = t.querySelector(`[data-edit-name="${id}"]`).value;
          const price = Number(t.querySelector(`[data-edit-price="${id}"]`).value);
          const currency = t.querySelector(`[data-edit-currency="${id}"]`).value;
          const active = t.querySelector(`[data-edit-active="${id}"]`).value === "true";

          S.updateProduct(id, { name, price, currency, active });
          renderProducts();
        });
      });

      t.querySelectorAll("[data-del]").forEach(btn => {
        btn.addEventListener("click", () => {
          const id = btn.getAttribute("data-del");
          if (!confirm("Delete this product?")) return;
          S.deleteProduct(id);
          renderProducts();
        });
      });
    }

    function renderOrders() {
      const store = S.loadStore();
      const t = document.getElementById("ordersTable");
      const orders = S.getOrders(store);

      t.innerHTML = `
        <tr>
          <th>Order</th><th>Customer</th><th>Product</th><th>TxID</th><th>Status</th><th>Actions</th>
        </tr>
        ${orders.map(o => `
          <tr>
            <td><code>${escapeHtml(o.id)}</code>NLBR<span class="muted">${escapeHtml(o.createdAt)}</span></td>
            <td>${escapeHtml(o.email)}</td>
            <td>${escapeHtml(o.productSnapshot.name)}NLBR<span class="muted">$${Number(o.productSnapshot.price).toFixed(2)} ${escapeHtml(o.productSnapshot.currency)}</span></td>
            <td style="max-width:240px; word-break:break-all;">${escapeHtml(o.txId || "-")}</td>
            <td><b>${escapeHtml(o.status)}</b></td>
            <td>
              <button class="btn" data-paid="${o.id}">Approve</button>
              <button class="btn danger" data-rej="${o.id}">Reject</button>
              <button class="btn secondary" data-open="${o.id}">Open Msg</button>
            </td>
          </tr>
        `).join("")}
      `;

      t.querySelectorAll("[data-paid]").forEach(btn => btn.addEventListener("click", () => {
        S.setOrderStatus(btn.getAttribute("data-paid"), "PAID");
        renderOrders();
      }));
      t.querySelectorAll("[data-rej]").forEach(btn => btn.addEventListener("click", () => {
        S.setOrderStatus(btn.getAttribute("data-rej"), "REJECTED");
        renderOrders();
      }));
      t.querySelectorAll("[data-open]").forEach(btn => btn.addEventListener("click", () => {
        const id = btn.getAttribute("data-open");
        document.getElementById("m_orderId").value = id;
        renderMessages();
      }));
    }

    function renderMessages() {
      const orderId = document.getElementById("m_orderId").value.trim();
      const box = document.getElementById("msgList");
      if (!orderId) { box.innerHTML = "<div class='muted'>Enter an Order ID</div>"; return; }

      const msgs = S.getMessages(orderId);
      box.innerHTML = msgs.map(m => `
        <div class="card" style="margin:8px 0;">
          <b>${escapeHtml(m.from)}</b> <span class="muted">(${escapeHtml(m.createdAt)})</span>\

          ${escapeHtml(m.text)}
        </div>
      `).join("");
      if (msgs.length === 0) box.innerHTML = "<div class='muted'>No messages found for this order.</div>";
    }

    document.getElementById("btnSaveSettings").addEventListener("click", () => {
      const walletAddress = document.getElementById("wallet").value.trim();
      const network = document.getElementById("network").value.trim();
      const note = document.getElementById("note").value.trim();
      S.updateSettings({ walletAddress, network, note });
      alert("Saved!");
    });

    document.getElementById("btnAddProduct").addEventListener("click", () => {
      try {
        S.addProduct({
          name: document.getElementById("p_name").value.trim(),
          price: Number(document.getElementById("p_price").value),
          currency: document.getElementById("p_currency").value,
          description: document.getElementById("p_desc").value.trim(),
          active: document.getElementById("p_active").value === "true",
        });
        document.getElementById("p_name").value = "";
        document.getElementById("p_desc").value = "";
        renderProducts();
      } catch (e) {
        alert(e.message || "Failed");
      }
    });

    document.getElementById("btnReply").addEventListener("click", () => {
      const orderId = document.getElementById("m_orderId").value.trim();
      const text = document.getElementById("m_text").value;
      try {
        S.addMessage(orderId, "ADMIN", text);
        document.getElementById("m_text").value = "";
        renderMessages();
      } catch (e) {
        alert(e.message || "Failed");
      }
    });

    document.getElementById("m_orderId").addEventListener("input", renderMessages);

    document.getElementById("btnReset").addEventListener("click", () => {
      if (!confirm("সব ডাটা ডিলিট হবে (products, orders, messages). Continue?")) return;
      S.resetStore();
      loadSettingsUI();
      renderProducts();
      renderOrders();
      renderMessages();
    });

    // init
    loadSettingsUI();
    renderProducts();
    renderOrders();
    renderMessages();
  </script>
</body>
</html>
