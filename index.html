<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Panel Shop</title>

  <style>
    /* ===== Base ===== */
    * { box-sizing: border-box; }
    html, body { width: 100%; overflow-x: hidden; }
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: #e8eefc;
      background: radial-gradient(1200px 600px at 10% 10%, rgba(43,120,255,.18), transparent 60%),
                  radial-gradient(900px 480px at 90% 90%, rgba(124,196,255,.10), transparent 60%),
                  #0b0f17;
    }

    :root{
      --panel: rgba(17,26,46,.78);
      --panel2: rgba(15,25,48,.84);
      --stroke: rgba(30,42,68,.9);
      --stroke2: rgba(38,54,86,.9);
      --text:#e8eefc;
      --muted: rgba(232,238,252,.74);
      --brand:#2b78ff;
      --brand2:#7cc4ff;
    }

    a { color: var(--brand2); text-decoration: none; }
    .muted { color: var(--muted); font-size: 13px; }
    .wrap { max-width: 1000px; margin: 0 auto; padding: 20px; }
    h2 { margin: 18px 0 12px; letter-spacing: .2px; }

    /* ===== Header ===== */
    header{
      position: sticky;
      top: 0;
      z-index: 10;
      display:flex;
      gap: 12px;
      align-items:center;
      justify-content: space-between;
      padding: 14px 18px;
      border-bottom: 1px solid var(--stroke);
      background: rgba(11,15,23,.55);
      backdrop-filter: blur(10px);
    }
    .brand{
      display:flex;
      flex-direction: column;
      line-height: 1.1;
      min-width: 110px;
      font-weight: 800;
      letter-spacing: .2px;
    }
    .topRight{
      margin-left: auto;
      display:flex;
      gap: 10px;
      align-items:center;
    }
    .chip{
      display:inline-flex;
      align-items:center;
      gap: 8px;
      padding: 8px 10px;
      border-radius: 999px;
      border: 1px solid rgba(124,196,255,.22);
      background: rgba(15,25,48,.55);
      transition: transform .12s ease, filter .2s ease, border-color .25s ease;
      user-select: none;
      white-space: nowrap;
    }
    .chip:hover{ filter: brightness(1.08); border-color: rgba(124,196,255,.35); }
    .chip:active{ transform: translateY(1px); }

    /* ===== Cards / buttons ===== */
    .card{
      background: linear-gradient(180deg, var(--panel2), var(--panel));
      border: 1px solid var(--stroke);
      border-radius: 16px;
      padding: 14px;
      box-shadow: 0 20px 60px rgba(0,0,0,.35);
      backdrop-filter: blur(10px);
      transition: transform .25s ease, box-shadow .25s ease, border-color .25s ease;
    }
    .card:hover{
      transform: translateY(-2px);
      box-shadow: 0 26px 80px rgba(0,0,0,.42);
      border-color: rgba(124,196,255,.28);
    }

    .grid{
      display:grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 14px;
    }

    .btn{
      border: none;
      cursor: pointer;
      color: white;
      background: var(--brand);
      padding: 10px 12px;
      border-radius: 12px;
      transition: transform .12s ease, filter .2s ease;
    }
    .btn:hover{ filter: brightness(1.08); }
    .btn:active{ transform: translateY(1px) scale(.99); }
    .btn.secondary{ background: rgba(36,49,77,1); }

    input, textarea{
      width:100%;
      padding: 10px;
      border-radius: 12px;
      border: 1px solid var(--stroke2);
      background: rgba(11,19,36,.85);
      color: var(--text);
      outline: none;
    }
    input:focus, textarea:focus{
      border-color: rgba(124,196,255,.45);
      box-shadow: 0 0 0 4px rgba(43,120,255,.10);
    }
    label{ display:block; margin: 10px 0 6px; opacity:.92; }

    .row{ display:flex; gap:10px; }
    .row > *{ flex: 1; }

    hr.sep{ border:0; border-top: 1px solid var(--stroke); margin: 18px 0; opacity:.8; }

    /* ===== Animations ===== */
    @keyframes floatIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .sectionIn{ animation: floatIn .35s ease both; }

    @keyframes pulseGlow {
      0% { box-shadow: 0 0 0 rgba(43,120,255,0); }
      50% { box-shadow: 0 0 24px rgba(43,120,255,.22); }
      100% { box-shadow: 0 0 0 rgba(43,120,255,0); }
    }

    /* ===== TxID big + copy ===== */
    .txBox{
      margin-top: 10px;
      padding: 12px;
      border-radius: 16px;
      background: rgba(11,19,36,.80);
      border: 1px solid rgba(34,50,82,.95);
      cursor: pointer;
      user-select: none;
      animation: pulseGlow 2.4s ease-in-out infinite;
    }
    .txLabel{ font-size: 12px; opacity:.82; }
    .txValue{
      margin-top: 6px;
      font-size: 16px;
      font-weight: 800;
      letter-spacing: .2px;
      word-break: break-all;
      line-height: 1.25;
    }
    .copyHint{
      margin-top: 10px;
      display:flex;
      align-items:center;
      justify-content: space-between;
      gap: 10px;
      font-size: 12px;
      opacity: .9;
    }
    .copyBtn{
      display:inline-flex;
      align-items:center;
      gap: 8px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(43,120,255,.14);
      border: 1px solid rgba(43,120,255,.35);
    }

    /* ===== Modal ===== */
    .modal-backdrop{
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background: rgba(0,0,0,.62);
      backdrop-filter: blur(6px);
      z-index: 9999;
    }
    .modal{
      width: 100%;
      max-width: 720px;
      background: linear-gradient(180deg, rgba(15,25,48,.92), rgba(11,19,36,.92));
      border: 1px solid rgba(35,52,88,.95);
      border-radius: 18px;
      padding: 16px;
      box-shadow: 0 30px 90px rgba(0,0,0,.55);
      animation: floatIn .22s ease both;
    }

    /* ===== Messages ===== */
    .msg{
      padding: 10px 12px;
      border-radius: 14px;
      margin: 10px 0;
      background: rgba(11,19,36,.85);
      border: 1px solid rgba(34,50,82,.95);
    }
    .msg b{ color: var(--brand2); }

    code{
      background: rgba(11,19,36,.85);
      padding: 2px 6px;
      border-radius: 10px;
      word-break: break-all;
    }

    /* ===== Toast ===== */
    .toast{
      position: fixed;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      background: rgba(15,25,48,.95);
      border: 1px solid rgba(124,196,255,.28);
      color: var(--text);
      padding: 10px 12px;
      border-radius: 999px;
      box-shadow: 0 20px 60px rgba(0,0,0,.45);
      display:none;
      z-index: 99999;
    }

    /* ===== Mobile fixes ===== */
    @media (max-width: 600px){
      .wrap{ padding: 14px; }
      header{ flex-wrap: wrap; gap: 8px; }
      .topRight{ width: 100%; justify-content: flex-end; }
      .btn{ width: 100%; }
    }

    /* Stack only specific rows on mobile (prevents overlap) */
    @media (max-width: 900px){
      .rowStack, .rowStackModal{
        flex-direction: column !important;
        gap: 10px !important;
      }
      .rowStack > *, .rowStackModal > *{
        width: 100% !important;
        flex: none !important;
      }
    }
  </style>
</head>

<body>
  <script src="./app.js"></script>

  <header>
    <div class="brand">
      <span>Panel</span>
      <span>Shop</span>
    </div>

    <div class="muted">BEP20 payment + TxID submit</div>

    <div class="topRight">
      <a class="chip" href="./admin.html" target="_blank" rel="noopener">
        <span>Admin Panel</span><span>→</span>
      </a>
    </div>
  </header>

  <div class="wrap">
    <h2 class="sectionIn">Products</h2>
    <div id="products" class="grid sectionIn"></div>

    <hr class="sep" />

    <h2 class="sectionIn">Check Order</h2>
    <div class="card sectionIn">
      <div class="row rowStack">
        <div>
          <label>Order ID</label>
          <input id="lookupOrderId" placeholder="order_xxx..." />
        </div>
        <div>
          <label>Email (same as order)</label>
          <input id="lookupEmail" placeholder="your@email.com" />
        </div>
      </div>

      <button class="btn secondary" id="btnLookup" style="margin-top:10px;">Load Order</button>

      <div id="orderBox" style="margin-top:12px; display:none;">
        <div class="card sectionIn">
          <div><b>Order:</b> <span id="o_id"></span></div>
          <div><b>Status:</b> <span id="o_status"></span></div>
          <div><b>Product:</b> <span id="o_prod"></span></div>
          <div><b>Name:</b> <span id="o_name"></span></div>
          <div><b>Telegram:</b> <span id="o_tg"></span></div>

          <div class="txBox" id="txCopyBox" title="Tap to copy TxID">
            <div class="txLabel">Transaction ID (Tap / Click to copy)</div>
            <div class="txValue" id="o_tx_big">-</div>
            <div class="copyHint">
              <span class="muted">ট্যাপ করলে কপি হবে</span>
              <span class="copyBtn">Copy</span>
            </div>
          </div>
        </div>

        <h3 style="margin-top:14px;">Messages</h3>
        <div id="msgs"></div>

        <label>Write message</label>
        <textarea id="msgText" rows="3" placeholder="Write your message..."></textarea>
        <button class="btn" id="btnSendMsg" style="margin-top:10px;">Send</button>
      </div>
    </div>
  </div>

  <!-- Modal -->
  <div class="modal-backdrop" id="modalBackdrop">
    <div class="modal">
      <div style="display:flex; justify-content:space-between; align-items:center; gap:10px;">
        <h3 style="margin:0;">Checkout</h3>
        <button class="btn secondary" id="btnClose" style="width:auto;">Close</button>
      </div>

      <div class="card" style="margin-top:12px;">
        <div><b>Product:</b> <span id="m_prod"></span></div>
        <div><b>Amount:</b> <span id="m_amount"></span></div>
      </div>

      <div class="card" style="margin-top:12px;">
        <div class="muted">Send payment to:</div>
        <div><b>Network:</b> <span id="m_net"></span></div>
        <div><b>Wallet:</b> <code id="m_wallet"></code></div>
        <div class="muted" id="m_note"></div>
      </div>

      <!-- NEW FIELDS -->
      <div class="row rowStackModal" style="margin-top:10px;">
        <div>
          <label>Your Name</label>
          <input id="m_name" placeholder="Your full name" />
        </div>
        <div>
          <label>Telegram Username</label>
          <input id="m_tg" placeholder="@username" />
        </div>
      </div>

      <div class="row rowStackModal" style="margin-top:10px;">
        <div>
          <label>Email</label>
          <input id="m_email" placeholder="your@email.com" />
        </div>
        <div>
          <label>TxID (Transaction Hash)</label>
          <input id="m_txid" placeholder="0x..." />
        </div>
      </div>

      <button class="btn" id="btnSubmitOrder" style="margin-top:10px;">Submit & Verify</button>
      <div id="m_result" class="card" style="display:none; margin-top:12px;"></div>
    </div>
  </div>

  <div class="toast" id="toast">Copied!</div>

  <script>
    const S = window.PanelShop;

    const productsEl = document.getElementById("products");
    const modal = document.getElementById("modalBackdrop");
    const btnClose = document.getElementById("btnClose");
    const btnSubmit = document.getElementById("btnSubmitOrder");

    let selectedProduct = null;

    const FORMSPREE_URL = "https://formspree.io/f/xeeblgkr";

    function escapeHtml(s) {
      return String(s || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function showToast(text){
      const t = document.getElementById("toast");
      t.textContent = text;
      t.style.display = "block";
      clearTimeout(window.__toastTimer);
      window.__toastTimer = setTimeout(() => t.style.display = "none", 1400);
    }

    async function copyText(text){
      try{
        await navigator.clipboard.writeText(text);
        showToast("TxID copied!");
      }catch(e){
        const ta = document.createElement("textarea");
        ta.value = text;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand("copy");
        document.body.removeChild(ta);
        showToast("TxID copied!");
      }
    }

    function renderProducts() {
      const store = S.loadStore();
      const products = S.getActiveProducts(store);
      productsEl.innerHTML = products.map(p => `
        <div class="card">
          <div style="display:flex; justify-content:space-between; gap:10px;">
            <b>${escapeHtml(p.name)}</b>
            <span>$${Number(p.price).toFixed(2)} ${escapeHtml(p.currency || "")}</span>
          </div>
          <div class="muted" style="margin-top:8px;">${escapeHtml(p.description || "")}</div>
          <div style="margin-top:12px;">
            <button class="btn" data-buy="${p.id}">Buy</button>
          </div>
        </div>
      `).join("");

      productsEl.querySelectorAll("[data-buy]").forEach(btn => {
        btn.addEventListener("click", () => openCheckout(btn.getAttribute("data-buy")));
      });
    }

    function openCheckout(productId) {
      const store = S.loadStore();
      const p = store.products.find(x => x.id === productId);
      if (!p) return alert("Product not found");

      selectedProduct = p;

      document.getElementById("m_prod").textContent = p.name;
      document.getElementById("m_amount").textContent = `$${Number(p.price).toFixed(2)} ${p.currency || ""}`;
      document.getElementById("m_net").textContent = store.settings.network;
      document.getElementById("m_wallet").textContent = store.settings.walletAddress;
      document.getElementById("m_note").textContent = store.settings.note || "";

      document.getElementById("m_name").value = "";
      document.getElementById("m_tg").value = "";
      document.getElementById("m_email").value = "";
      document.getElementById("m_txid").value = "";

      const r = document.getElementById("m_result");
      r.style.display = "none";
      r.innerHTML = "";

      modal.style.display = "flex";
    }

    btnClose.addEventListener("click", () => modal.style.display = "none");
    modal.addEventListener("click", (e) => { if (e.target === modal) modal.style.display = "none"; });

    btnSubmit.addEventListener("click", () => {
      try {
        const name = document.getElementById("m_name").value.trim();
        const telegram = document.getElementById("m_tg").value.trim();
        const email = document.getElementById("m_email").value.trim();
        const txId = document.getElementById("m_txid").value.trim();

        const order = S.createOrder({
          name,
          telegram,
          email,
          productId: selectedProduct.id,
          txId
        });

        // ===== Email notify via Formspree (works across any phone) =====
        fetch(FORMSPREE_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json", "Accept": "application/json" },
          body: JSON.stringify({
            subject: `New order: ${selectedProduct.name}`,
            customer_name: name,
            telegram: telegram,
            customer_email: email,
            product: selectedProduct.name,
            price: selectedProduct.price,
            currency: selectedProduct.currency,
            txId: txId,
            orderId: order.id,
            status: order.status,
            page: location.href,
            time: new Date().toISOString()
          })
        }).catch(() => {});

        const r = document.getElementById("m_result");
        r.style.display = "block";
        r.innerHTML = `
          <b>Submitted!</b>\

          Order ID: <code>${order.id}</code>\

          Status: <b>${order.status}</b>\

          এখন আপনার Order ID কপি করে নিচে “Check Order” থেকে দেখতে পারবেন।
        `;
      } catch (err) {
        alert(err.message || "Failed");
      }
    });

    // Order lookup + messaging
    const btnLookup = document.getElementById("btnLookup");
    const orderBox = document.getElementById("orderBox");
    const msgsEl = document.getElementById("msgs");

    function loadOrderForUser() {
      const store = S.loadStore();
      const orderId = document.getElementById("lookupOrderId").value.trim();
      const email = document.getElementById("lookupEmail").value.trim();
      const o = store.orders.find(x => x.id === orderId);

      if (!o) { alert("Order not found"); return; }
      if (o.email !== email) { alert("Email mismatch"); return; }

      document.getElementById("o_id").textContent = o.id;
      document.getElementById("o_status").textContent = o.status;
      document.getElementById("o_prod").textContent =
        `${o.productSnapshot.name} ($${Number(o.productSnapshot.price).toFixed(2)} ${o.productSnapshot.currency})`;

      document.getElementById("o_name").textContent = o.name || "-";
      document.getElementById("o_tg").textContent = o.telegram || "-";

      const tx = o.txId || "-";
      document.getElementById("o_tx_big").textContent = tx;

      orderBox.style.display = "block";

      const msgs = S.getMessages(o.id);
      msgsEl.innerHTML = msgs.map(m => `
        <div class="msg">
          <b>${escapeHtml(m.from)}</b> <span class="muted">(${escapeHtml(m.createdAt)})</span>\

          ${escapeHtml(m.text)}
        </div>
      `).join("");
    }

    btnLookup.addEventListener("click", loadOrderForUser);

    document.getElementById("btnSendMsg").addEventListener("click", () => {
      const orderId = document.getElementById("lookupOrderId").value.trim();
      const email = document.getElementById("lookupEmail").value.trim();
      const store = S.loadStore();
      const o = store.orders.find(x => x.id === orderId);
      if (!o) return alert("Order not found");
      if (o.email !== email) return alert("Email mismatch");

      const text = document.getElementById("msgText").value;
      try {
        S.addMessage(orderId, "USER", text);
        document.getElementById("msgText").value = "";
        loadOrderForUser();
      } catch (e) {
        alert(e.message || "Failed");
      }
    });

    document.getElementById("txCopyBox").addEventListener("click", () => {
      const tx = document.getElementById("o_tx_big").textContent.trim();
      if (!tx || tx === "-") return;
      copyText(tx);
    });

    renderProducts();
  </script>
</body>
  </html>
