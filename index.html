<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Panel Shop</title>
  <style>
    body { font-family: Arial, sans-serif; background:#0b0f17; color:#e8eefc; margin:0; }
    header { padding:16px 20px; border-bottom:1px solid #1e2a44; display:flex; gap:12px; align-items:center; }
    a { color:#7cc4ff; text-decoration:none; }
    .wrap { max-width:1000px; margin:0 auto; padding:20px; }
    .grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap:14px; }
    .card { background:#111a2e; border:1px solid #1e2a44; border-radius:12px; padding:14px; }
    .btn { background:#2b78ff; border:none; color:white; padding:10px 12px; border-radius:10px; cursor:pointer; }
    .btn.secondary { background:#24314d; }
    input, textarea, select { width:100%; padding:10px; border-radius:10px; border:1px solid #263656; background:#0b1324; color:#e8eefc; }
    label { display:block; margin:10px 0 6px; opacity:.9; }
    .row { display:flex; gap:10px; }
    .row > * { flex:1; }
    .muted { opacity:.8; font-size: 13px; }
    .modal-backdrop { position:fixed; inset:0; background:rgba(0,0,0,.6); display:none; align-items:center; justify-content:center; padding:18px; }
    .modal { max-width:720px; width:100%; background:#0f1930; border:1px solid #233458; border-radius:14px; padding:16px; }
    .msg { padding:8px 10px; border-radius:10px; margin:8px 0; background:#0b1324; border:1px solid #223252; }
    .msg b { color:#7cc4ff; }
    code { background:#0b1324; padding:2px 6px; border-radius:8px; }
  </style>
</head>
<body>
  <script src="./app.js"></script>

  <header>
    <b>Panel Shop</b>
    <span class="muted">BEP20 payment + TxID submit</span>
    <div style="margin-left:auto">
      <a href="./admin.html" target="_blank">Admin Panel →</a>
    </div>
  </header>

  <div class="wrap">
    <h2>Products</h2>
    <div id="products" class="grid"></div>

    <hr style="border:0;border-top:1px solid #1e2a44;margin:18px 0" />

    <h2>Check Order</h2>
    <div class="card">
      <div class="row">
        <div>
          <label>Order ID</label>
          <input id="lookupOrderId" placeholder="order_xxx..." />
        </div>
        <div>
          <label>Email (same as order)</label>
          <input id="lookupEmail" placeholder="your@email.com" />
        </div>
      </div>
      <button class="btn secondary" id="btnLookup">Load Order</button>

      <div id="orderBox" style="margin-top:12px; display:none;">
        <div class="card">
          <div><b>Order:</b> <span id="o_id"></span></div>
          <div><b>Status:</b> <span id="o_status"></span></div>
          <div><b>Product:</b> <span id="o_prod"></span></div>
          <div><b>TxID:</b> <span id="o_tx"></span></div>
        </div>

        <h3>Messages</h3>
        <div id="msgs"></div>

        <label>Write message</label>
        <textarea id="msgText" rows="3" placeholder="Write your message..."></textarea>
        <button class="btn" id="btnSendMsg">Send</button>
      </div>
    </div>
  </div>

  <!-- Modal -->
  <div class="modal-backdrop" id="modalBackdrop">
    <div class="modal">
      <div style="display:flex; justify-content:space-between; align-items:center; gap:10px;">
        <h3 style="margin:0;">Checkout</h3>
        <button class="btn secondary" id="btnClose">Close</button>
      </div>

      <div class="card" style="margin-top:12px;">
        <div><b>Product:</b> <span id="m_prod"></span></div>
        <div><b>Amount:</b> <span id="m_amount"></span></div>
      </div>

      <div class="card" style="margin-top:12px;">
        <div class="muted">Send payment to:</div>
        <div><b>Network:</b> <span id="m_net"></span></div>
        <div><b>Wallet:</b> <code id="m_wallet"></code></div>
        <div class="muted" id="m_note"></div>
      </div>

      <div class="row">
        <div>
          <label>Email</label>
          <input id="m_email" placeholder="your@email.com" />
        </div>
        <div>
          <label>TxID (Transaction Hash)</label>
          <input id="m_txid" placeholder="0x..." />
        </div>
      </div>

      <button class="btn" id="btnSubmitOrder">Submit & Verify</button>

      <div id="m_result" class="card" style="display:none; margin-top:12px;"></div>
    </div>
  </div>

  <script>
    const S = window.PanelShop;

    const productsEl = document.getElementById("products");
    const modal = document.getElementById("modalBackdrop");
    const btnClose = document.getElementById("btnClose");
    const btnSubmit = document.getElementById("btnSubmitOrder");

    let selectedProduct = null;

    function renderProducts() {
      const store = S.loadStore();
      const products = S.getActiveProducts(store);
      productsEl.innerHTML = products.map(p => `
        <div class="card">
          <div style="display:flex; justify-content:space-between; gap:10px;">
            <b>${escapeHtml(p.name)}</b>
            <span>$${Number(p.price).toFixed(2)} ${escapeHtml(p.currency || "")}</span>
          </div>
          <div class="muted" style="margin-top:8px;">${escapeHtml(p.description || "")}</div>
          <div style="margin-top:12px;">
            <button class="btn" data-buy="${p.id}">Buy</button>
          </div>
        </div>
      `).join("");

      productsEl.querySelectorAll("[data-buy]").forEach(btn => {
        btn.addEventListener("click", () => openCheckout(btn.getAttribute("data-buy")));
      });
    }

    function openCheckout(productId) {
      const store = S.loadStore();
      const p = store.products.find(x => x.id === productId);
      if (!p) return alert("Product not found");

      selectedProduct = p;

      document.getElementById("m_prod").textContent = p.name;
      document.getElementById("m_amount").textContent = `$${Number(p.price).toFixed(2)} ${p.currency || ""}`;
      document.getElementById("m_net").textContent = store.settings.network;
      document.getElementById("m_wallet").textContent = store.settings.walletAddress;
      document.getElementById("m_note").textContent = store.settings.note || "";

      document.getElementById("m_email").value = "";
      document.getElementById("m_txid").value = "";
      const r = document.getElementById("m_result");
      r.style.display = "none";
      r.innerHTML = "";

      modal.style.display = "flex";
    }

    btnClose.addEventListener("click", () => modal.style.display = "none");
    modal.addEventListener("click", (e) => { if (e.target === modal) modal.style.display = "none"; });

    btnSubmit.addEventListener("click", () => {
      try {
        const email = document.getElementById("m_email").value.trim();
        const txId = document.getElementById("m_txid").value.trim();

        const order = S.createOrder({ email, productId: selectedProduct.id, txId });

        const r = document.getElementById("m_result");
        r.style.display = "block";
        r.innerHTML = `
          <b>Submitted!</b>\

          Order ID: <code>${order.id}</code>\

          Status: <b>${order.status}</b>\

          এখন আপনার Order ID কপি করে নিচে “Check Order” থেকে দেখতে পারবেন।
        `;
      } catch (err) {
        alert(err.message || "Failed");
      }
    });

    // Order lookup + messaging
    const btnLookup = document.getElementById("btnLookup");
    const orderBox = document.getElementById("orderBox");
    const msgsEl = document.getElementById("msgs");

    function loadOrderForUser() {
      const store = S.loadStore();
      const orderId = document.getElementById("lookupOrderId").value.trim();
      const email = document.getElementById("lookupEmail").value.trim();
      const o = store.orders.find(x => x.id === orderId);

      if (!o) { alert("Order not found"); return; }
      if (o.email !== email) { alert("Email mismatch"); return; }

      document.getElementById("o_id").textContent = o.id;
      document.getElementById("o_status").textContent = o.status;
      document.getElementById("o_prod").textContent = `${o.productSnapshot.name} ($${Number(o.productSnapshot.price).toFixed(2)} ${o.productSnapshot.currency})`;
      document.getElementById("o_tx").textContent = o.txId || "-";

      orderBox.style.display = "block";

      const msgs = S.getMessages(o.id);
      msgsEl.innerHTML = msgs.map(m => `
        <div class="msg">
          <b>${escapeHtml(m.from)}</b> <span class="muted">(${escapeHtml(m.createdAt)})</span>\

          ${escapeHtml(m.text)}
        </div>
      `).join("");
    }

    btnLookup.addEventListener("click", loadOrderForUser);

    document.getElementById("btnSendMsg").addEventListener("click", () => {
      const orderId = document.getElementById("lookupOrderId").value.trim();
      const email = document.getElementById("lookupEmail").value.trim();
      const store = S.loadStore();
      const o = store.orders.find(x => x.id === orderId);
      if (!o) return alert("Order not found");
      if (o.email !== email) return alert("Email mismatch");

      const text = document.getElementById("msgText").value;
      try {
        S.addMessage(orderId, "USER", text);
        document.getElementById("msgText").value = "";
        loadOrderForUser();
      } catch (e) {
        alert(e.message || "Failed");
      }
    });

    function escapeHtml(s) {
      return String(s || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    renderProducts();
  </script>
</body>
</html>
